<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Шеф-Повар AI</title>
    <script src="https://telegram.org/js/telegram-web-app.js?56"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        .card {
            background: white;
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        h1 {
            font-size: 28px;
            margin-bottom: 8px;
            color: #333;
        }
        .status {
            background: #e8f5e9;
            padding: 10px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: 14px;
            color: #2e7d32;
        }
        textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 12px;
            font-size: 16px;
            font-family: inherit;
            margin-bottom: 12px;
            resize: vertical;
        }
        button {
            width: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }
        button:active {
            transform: scale(0.98);
        }
        .recipe {
            background: white;
            border-radius: 20px;
            padding: 24px;
            margin-top: 20px;
        }
        .recipe h2 {
            color: #667eea;
            margin-bottom: 16px;
        }
        .recipe h3 {
            margin: 16px 0 8px;
            color: #555;
        }
        .recipe ul, .recipe ol {
            margin-left: 20px;
            margin-bottom: 16px;
        }
        .recipe li {
            margin: 8px 0;
            line-height: 1.5;
        }
        .loading {
            text-align: center;
            padding: 40px;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .error {
            color: #d32f2f;
            background: #ffebee;
            padding: 12px;
            border-radius: 12px;
            margin-top: 16px;
        }
        .success {
            color: #2e7d32;
            background: #e8f5e9;
            padding: 12px;
            border-radius: 12px;
            margin-top: 16px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>👨‍🍳 Шеф-Повар AI</h1>
            <div class="status" id="status">🔄 Подключение...</div>
        </div>

        <div class="card">
            <textarea id="dish" rows="3" placeholder="Что будем готовить? Например: борщ, паста карбонара, пицца..."></textarea>
            <textarea id="details" rows="2" placeholder="Детали (необязательно): ПП, быстро, на 2 персоны..."></textarea>
            <button id="cookBtn">🍳 Приготовить рецепт</button>
        </div>

        <div id="result"></div>
    </div>

    <script>
        // Telegram WebApp
        let tg;
        try {
            tg = window.Telegram.WebApp;
            tg.ready();
            tg.expand();
            console.log('✅ Telegram WebApp готов');
        } catch(e) {
            console.error('❌ Ошибка Telegram:', e);
            tg = null;
        }

        // ID пользователя
        function getUserId() {
            if (tg && tg.initDataUnsafe && tg.initDataUnsafe.user && tg.initDataUnsafe.user.id) {
                return tg.initDataUnsafe.user.id;
            }
            // Тестовый ID (замените на свой)
            return 8043971654;
        }

        // Загрузка статуса пользователя
        async function loadUser() {
            const statusDiv = document.getElementById('status');
            const userId = getUserId();
            
            try {
                const response = await fetch(`/api/user/${userId}`);
                const data = await response.json();
                
                if (data.success) {
                    if (data.hasSubscription) {
                        statusDiv.innerHTML = `✨ Подписка ${data.subscription.plan_type} активна ✨`;
                        statusDiv.className = 'status success';
                    } else {
                        statusDiv.innerHTML = `🎁 Бесплатно: осталось ${data.freeRecipesLeft} из 3 рецептов`;
                        statusDiv.className = 'status';
                    }
                } else {
                    statusDiv.innerHTML = '⚠️ Не удалось загрузить данные';
                }
            } catch(e) {
                console.error('Load error:', e);
                statusDiv.innerHTML = '⚠️ Ошибка соединения, но вы можете генерировать рецепты';
            }
        }

        // Генерация рецепта
        async function generateRecipe() {
            const dish = document.getElementById('dish').value.trim();
            const details = document.getElementById('details').value.trim();
            const resultDiv = document.getElementById('result');
            
            if (!dish) {
                alert('Напишите, что хотите приготовить');
                return;
            }
            
            resultDiv.innerHTML = `
                <div class="loading">
                    <div class="spinner"></div>
                    <p>👨‍🍳 Шеф готовит рецепт...</p>
                </div>
            `;
            
            try {
                const response = await fetch('/api/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        tgId: getUserId(),
                        query: dish,
                        details: details,
                        planType: 'FREE'
                    })
                });
                
                const data = await response.json();
                
                if (data.success && data.recipe) {
                    const r = data.recipe;
                    resultDiv.innerHTML = `
                        <div class="recipe">
                            <h2>🍽 ${escapeHtml(r.title)}</h2>
                            ${r.description ? `<p>${escapeHtml(r.description)}</p>` : ''}
                            
                            <h3>🥄 Ингредиенты:</h3>
                            <ul>
                                ${(r.ingredients || ['Ингредиенты не указаны']).map(i => `<li>${escapeHtml(i)}</li>`).join('')}
                            </ul>
                            
                            <h3>🔥 Приготовление:</h3>
                            <ol>
                                ${(r.steps || ['Шаги не указаны']).map(s => `<li>${escapeHtml(s)}</li>`).join('')}
                            </ol>
                            
                            ${r.tips ? `<h3>✨ Советы Шефа:</h3><p>${escapeHtml(r.tips)}</p>` : ''}
                            
                            <hr style="margin: 16px 0;">
                            <p style="text-align: center; color: #888;">🍽️ Приятного аппетита!</p>
                        </div>
                    `;
                    // Обновляем статус (уменьшился счетчик)
                    await loadUser();
                } else {
                    resultDiv.innerHTML = `<div class="error">❌ Ошибка: ${data.error || 'Не удалось сгенерировать рецепт'}</div>`;
                }
            } catch(e) {
                console.error('Generate error:', e);
                resultDiv.innerHTML = `<div class="error">❌ Ошибка соединения с сервером. Проверьте интернет.</div>`;
            }
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // Запуск
        document.getElementById('cookBtn').addEventListener('click', generateRecipe);
        loadUser();
        
        console.log('✅ Страница загружена, API URL:', window.location.origin);
    </script>
</body>
</html>
